<svg width="1200" height="640" viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">DRL-Guided Rare Disease Medical Image Generation Architecture</title>
  <desc id="arch-desc">Pipeline: HAM10000 dataset → Conditional GAN → PPO Agent ↔ ResNet18 classifier → Evaluation metrics.</desc>

  <!-- Background -->
  <rect width="1200" height="640" rx="28" fill="#0f172a"/>
  <circle cx="1080" cy="70" r="170" fill="#1e3a8a" opacity="0.35"/>
  <circle cx="120" cy="570" r="180" fill="#134e4a" opacity="0.30"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800" fill="#f8fafc">Medical Image Generation for Rare Diseases</text>
  <text x="600" y="88" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#94a3b8">Deep Reinforcement Learning · cGAN · PPO · HAM10000</text>

  <!-- ─── BOX 1: HAM10000 ─── -->
  <rect x="50" y="175" width="200" height="130" rx="20" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <rect x="70" y="200" width="56" height="56" rx="14" fill="#0369a1"/>
  <path d="M84 233 C95 210 109 210 118 233" stroke="#f8fafc" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <text x="145" y="220" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#f8fafc">HAM10000</text>
  <text x="145" y="242" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#94a3b8">Skin lesion images</text>
  <text x="145" y="262" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#7dd3fc">7 diagnostic classes</text>
  <text x="145" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#7dd3fc">Rare: akiec · df · vasc</text>

  <!-- ─── BOX 2: Conditional GAN ─── -->
  <rect x="310" y="155" width="220" height="170" rx="20" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <rect x="332" y="185" width="60" height="60" rx="14" fill="#065f46"/>
  <text x="362" y="224" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="900" fill="#ffffff">G</text>
  <text x="412" y="204" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#f8fafc">Conditional GAN</text>
  <text x="412" y="225" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#94a3b8">Label-aware generator</text>
  <text x="412" y="245" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#6ee7b7">DCGAN · EMA weights</text>
  <text x="412" y="265" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#6ee7b7">Hinge loss · R1 reg</text>
  <text x="412" y="285" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#6ee7b7">DiffAugment · 64×64px</text>

  <!-- ─── BOX 3: PPO Agent ─── -->
  <rect x="595" y="145" width="240" height="190" rx="20" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <rect x="620" y="178" width="60" height="60" rx="14" fill="#78350f"/>
  <text x="650" y="217" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="900" fill="#ffffff">π</text>
  <text x="700" y="196" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#f8fafc">PPO Agent</text>
  <text x="700" y="217" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#94a3b8">Latent-space navigation</text>
  <text x="700" y="237" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#fde68a">128-dim action space</text>
  <text x="700" y="257" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#fde68a">Reward: conf + realism</text>
  <text x="700" y="277" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#fde68a">+ prototype similarity</text>
  <text x="700" y="297" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#fde68a">+ diversity selection</text>

  <!-- ─── BOX 4: ResNet18 ─── -->
  <rect x="900" y="175" width="200" height="130" rx="20" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <rect x="920" y="200" width="56" height="56" rx="14" fill="#4c1d95"/>
  <text x="948" y="237" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="900" fill="#ffffff">R</text>
  <text x="990" y="220" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#f8fafc">ResNet18</text>
  <text x="990" y="242" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#94a3b8">Medical classifier</text>
  <text x="990" y="262" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#c4b5fd">Focal loss · 7 classes</text>
  <text x="990" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#c4b5fd">Feature prototypes</text>

  <!-- ─── EVALUATION BOX ─── -->
  <rect x="260" y="420" width="680" height="110" rx="22" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="458" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#f8fafc">Evaluation &amp; Research Outputs</text>
  <text x="370" y="492" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#7dd3fc">Target Rate 0.8% → 100%</text>
  <text x="600" y="492" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#86efac">Confidence ↑</text>
  <text x="810" y="492" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#fca5a5">FID · t-SNE · Image Grids</text>

  <!-- ─── ARROWS ─── -->
  <!-- HAM → GAN -->
  <line x1="252" y1="240" x2="308" y2="240" stroke="#e2e8f0" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- GAN → PPO -->
  <line x1="532" y1="240" x2="593" y2="240" stroke="#e2e8f0" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- PPO → ResNet -->
  <line x1="837" y1="240" x2="898" y2="240" stroke="#e2e8f0" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- ResNet → Eval box -->
  <path d="M1000 307 C1000 380 850 420 840 420" stroke="#e2e8f0" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <!-- GAN → Eval box -->
  <path d="M420 327 C420 390 480 420 500 420" stroke="#e2e8f0" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <!-- PPO → Eval box -->
  <path d="M715 337 C715 385 700 410 680 420" stroke="#e2e8f0" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <!-- Reward feedback loop: ResNet → GAN (dashed) -->
  <path d="M900 210 C860 120 680 100 534 180" stroke="#fbbf24" stroke-width="2" stroke-dasharray="9 7" fill="none" marker-end="url(#arr-gold)"/>
  <text x="720" y="110" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#fde68a">reward feedback loop</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#e2e8f0"/>
    </marker>
    <marker id="arr-gold" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#fbbf24"/>
    </marker>
  </defs>
</svg>
