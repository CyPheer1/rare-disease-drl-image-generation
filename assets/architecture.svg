<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DRL-Guided Rare Disease Medical Image Generation Architecture</title>
  <desc id="desc">Pipeline showing HAM10000 data, conditional GAN, ResNet18 medical classifier, PPO latent-space agent, and evaluation metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#e5e7eb"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <circle cx="1050" cy="80" r="160" fill="#2563eb" opacity="0.13"/>
  <circle cx="150" cy="540" r="190" fill="#14b8a6" opacity="0.10"/>
  <text x="600" y="62" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">Medical Image Generation for Rare Diseases</text>
  <text x="600" y="94" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#cbd5e1">Deep Reinforcement Learning guided cGAN latent-space exploration on HAM10000</text>

  <g filter="url(#shadow)">
    <rect x="65" y="180" width="190" height="120" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
    <rect x="85" y="205" width="52" height="52" rx="14" fill="url(#blue)"/>
    <path d="M100 238 C110 215 124 215 132 238" stroke="#f8fafc" stroke-width="5" fill="none" stroke-linecap="round"/>
    <text x="160" y="222" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="700" fill="#f8fafc">HAM10000</text>
    <text x="160" y="247" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#cbd5e1">Skin lesion images</text>
    <text x="160" y="269" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#93c5fd">Rare: akiec, df, vasc</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="325" y="160" width="215" height="160" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <rect x="348" y="190" width="62" height="62" rx="16" fill="url(#green)"/>
    <text x="379" y="230" text-anchor="middle" font-family="Inter, Segoe UI, Arial" font-size="30" font-weight="800" fill="#ffffff">G</text>
    <text x="430" y="205" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="700" fill="#f8fafc">Conditional GAN</text>
    <text x="430" y="231" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#cbd5e1">Label-aware generator</text>
    <text x="430" y="253" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#86efac">EMA + hinge loss</text>
    <text x="430" y="275" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#86efac">DiffAugment + R1</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="150" width="230" height="180" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <rect x="675" y="180" width="62" height="62" rx="16" fill="url(#orange)"/>
    <text x="706" y="219" text-anchor="middle" font-family="Inter, Segoe UI, Arial" font-size="28" font-weight="800" fill="#ffffff">π</text>
    <text x="755" y="197" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="700" fill="#f8fafc">PPO Agent</text>
    <text x="755" y="223" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#cbd5e1">Latent-space navigation</text>
    <text x="755" y="245" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#fed7aa">Reward: confidence</text>
    <text x="755" y="267" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#fed7aa">+ realism + prototype</text>
    <text x="755" y="289" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#fed7aa">+ diversity selection</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="955" y="180" width="190" height="120" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
    <rect x="975" y="205" width="52" height="52" rx="14" fill="url(#purple)"/>
    <text x="1001" y="239" text-anchor="middle" font-family="Inter, Segoe UI, Arial" font-size="24" font-weight="800" fill="#ffffff">R</text>
    <text x="1045" y="222" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="700" fill="#f8fafc">ResNet18</text>
    <text x="1045" y="247" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#cbd5e1">Medical classifier</text>
    <text x="1045" y="269" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#ddd6fe">Feature prototypes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="275" y="410" width="650" height="120" rx="26" fill="#0f172a" stroke="#475569" stroke-width="2"/>
    <text x="600" y="448" text-anchor="middle" font-family="Inter, Segoe UI, Arial" font-size="20" font-weight="800" fill="#f8fafc">Evaluation & Research Outputs</text>
    <text x="405" y="486" text-anchor="middle" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#bae6fd">Target Rate ↑</text>
    <text x="600" y="486" text-anchor="middle" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#bbf7d0">Confidence ↑</text>
    <text x="795" y="486" text-anchor="middle" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#fecaca">FID ↓</text>
  </g>

  <line x1="255" y1="240" x2="325" y2="240" stroke="#e5e7eb" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="540" y1="240" x2="650" y2="240" stroke="#e5e7eb" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="880" y1="240" x2="955" y2="240" stroke="#e5e7eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1050 300 C1050 405 890 470 925 470" stroke="#e5e7eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M430 320 C430 390 505 410 545 410" stroke="#e5e7eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M765 330 C765 375 735 400 705 410" stroke="#e5e7eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M955 220 C915 120 690 105 560 180" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <text x="760" y="126" text-anchor="middle" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#fde68a">reward feedback loop</text>
</svg>
